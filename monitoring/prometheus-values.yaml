grafana:
  adminPassword: "CropAdvisor@123"
  service:
    type: NodePort
    nodePort: 30300

prometheus:
  prometheusSpec:
    retention: 7d
    scrapeInterval: 15s
    resources:
      requests:
        cpu: 200m
        memory: 400Mi
    additionalScrapeConfigs:
      - job_name: crop-advisor-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - crop-advisor
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: "true"
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\\d+)?;(\\d+)
            replacement: $1:$2

alertmanager:
  enabled: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
