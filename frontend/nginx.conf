server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        try_files $uri $uri/ /index.html;  # React Router ke liye
    }

    location /api/ {
        proxy_pass http://backend-svc:8000;  # K8s service name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
        deny all;  # metrics externally expose mat karo
    }
}