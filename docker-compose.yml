services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - backend-static:/app/staticfiles
      - backend-media:/app/media
    networks:
      default:
        aliases:
          - backend-svc

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  backend-static:
  backend-media:
